<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>In The Paint — Sandhills Ballers</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="splash-screen">
    <img src="/assets/splash-ball.png" alt="" />
    <div class="splash-wordmark">
      <h2>In The<br><span>Paint</span></h2>
    </div>
  </div>

  <div id="app">
    <div class="demo-banner">Demo Mode — Sample Data</div>
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1>In The Paint</h1>
          <p class="subtitle">Sandhills Ballers</p>
        </div>
        <button class="header-avatar" id="header-avatar-btn" title="Profile">AD</button>
      </div>
    </header>

    <main id="auth-screen" class="screen">
      <form id="login-form" class="card">
        <h2>Sign In</h2>
        <label for="login-identifier">Email or Phone</label>
        <input type="text" id="login-identifier" required />
        <button type="submit">Sign In</button>
        <p class="hint">New here? You'll need an invite from your coach.</p>
      </form>
    </main>

    <main id="dashboard-screen" class="screen hidden">
      <nav class="bottom-nav">
        <a href="#schedule" class="nav-item active">Schedule</a>
        <a href="#roster" class="nav-item">Roster</a>
        <a href="#leaderboard" class="nav-item">Leaders</a>
        <a href="#training" class="nav-item">Training</a>
        <a href="#chat" class="nav-item">Chat</a>
        <a href="#gallery" class="nav-item">Gallery</a>
      </nav>
      <div id="content-area">
        <!-- populated by app.js based on role -->
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
